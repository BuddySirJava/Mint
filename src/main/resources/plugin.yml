name: Mint
version: 1.0.0
main: ir.buddy.mint.MintPlugin
api-version: '1.21'
folia-supported: true
author: BuddySirJava
website: https://ir.buddy
softdepend: [PlaceholderAPI, WorldGuard, GriefPrevention]
commands:
  mint:
    description: Main Mint command
    usage: /<command> [help|about|admin ...]
permissions:
  mint.admin:
    description: Allows using /mint admin (individual actions may require mint.reload, mint.toggle, mint.admin.global)
    default: op
  mint.admin.global:
    description: Allows /mint admin global to enable or disable modules in config for all players
    default: op
  mint.reload:
    description: Allows reloading Mint
    default: op
  mint.toggle:
    description: Allows toggling personal Mint modules
    default: op
  mint.toggle.others:
    description: Allows toggling Mint modules for other players
    default: op
  mint.bypass.protection:
    description: Bypass protection plugin checks for Mint features
    default: op
  mint.gui:
    description: Allows opening the personal Mint modules GUI
    default: true
