storage:
  # Available types: h2, mariadb, mysql, mongo, yaml
  download-missing-libraries: true
  player-toggles:
    type: yaml
    # settings:
    #   url: jdbc:h2:file:./plugins/Mint/player-toggles;AUTO_SERVER=TRUE
    #   username: sa
    #   password: ""
    #   database: mint
    #   collection: player_module_toggles

# Save reusable per-player toggle sets with:
# /mint admin profile save <name> [player]
# /mint admin profile load <name> [player]
# /mint admin profile delete <name>
profiles: {}

display-entity-control:
  enabled: true
  # Per-chunk hard cap for Mint-managed display entities.
  # Set to 0 to disable per-chunk capping.
  per-chunk-hard-cap: 96
  # On enable/reload, prune overflow in currently loaded chunks.
  startup-prune-loaded-chunks: true
  # Prune overflow each time a chunk is loaded.
  prune-on-chunk-load: true
  # Log when pruning occurs due to caps.
  log-prunes: true

display-backend:
  # auto: use ProtocolLib backend when available, otherwise bukkit fallback.
  # bukkit: always use normal Bukkit display entities.
  # protocollib: force ProtocolLib backend, but fallback to bukkit if unavailable.
  mode: auto
  allow-protocollib: true
  log-selection: true
  # ProtocolLib support on Folia is currently experimental.
  folia-protocollib-experimental: true

modules:
  reacharound-placement:
    leniency: 0.5
    whitelist: []
    blacklist: []
    visualizer:
      thickness: 0.008
      material: BLACK_STAINED_GLASS
      brightness:
        block: 15
        sky: 15
    # Permission defaults to mint.module.<module-key> when omitted.
    permission: mint.module.reacharound-placement
    # Per-world controls:
    # mode: all | whitelist | blacklist
    worlds:
      mode: all
      list: []
    enabled: true
    default-on-first-join: false
  boat-improvements:
    enabled: true
    default-on-first-join: true
  minecart-improvements:
    enabled: true
    default-on-first-join: true
  fast-ladders:
    enabled: true
    default-on-first-join: true
  shift-right-click-sort:
    enabled: true
    default-on-first-join: true
  sprintretention:
    enabled: true
    default-on-first-join: true
  doubledoor:
    enabled: true
    default-on-first-join: true
  blockdecoration:
    enabled: true
    default-on-first-join: true
  carpetgeometry:
    enabled: true
    default-on-first-join: true
    chunk-surface-limit: 64
  auto-tool:
    enabled: true
    default-on-first-join: false
  door-knock:
    enabled: true
    default-on-first-join: true
  sign-items:
    enabled: true
    default-on-first-join: true
  ladder-place:
    enabled: true
    default-on-first-join: true
  invisible-frame:
    enabled: true
    default-on-first-join: true
  leash-decoration:
    enabled: true
    default-on-first-join: true
  chicken-glide:
    enabled: true
    default-on-first-join: true
  painting-scroll:
    enabled: true
    default-on-first-join: false
  slab-breaker:
    enabled: true
    default-on-first-join: true
  mixedslab:
    enabled: true
    default-on-first-join: true
  verticalslab:
    enabled: true
    default-on-first-join: true
  auto-refill:
    enabled: true
    default-on-first-join: false
  expanded-item-interactions:
    enabled: true
    default-on-first-join: true
  dyeable-item-frames:
    enabled: true
    default-on-first-join: true
  bone-meal-anything:
    enabled: true
    default-on-first-join: true
    max-cactus-height: 3
    max-sugar-cane-height: 3
  crop-interact:
    enabled: true
    default-on-first-join: true
  chopdown:
    enabled: true
    default-on-first-join: true
    min-logs: 3
    min-leaves: 5
    trunk-min-height: 3
    leaf-steps: 4
    max-horizontal-offset: 6
    max-blocks: 256
    search-radius: 10
    sound:
      volume: 1.15
      pitch: 0.9
  torch-lighting:
    enabled: true
    default-on-first-join: true
    furnace-burn-ticks: 200
    blacklist: []
  feather-pluck:
    enabled: true
    default-on-first-join: true
    cooldown-seconds: 300
    feather-drop-min: 1
    feather-drop-max: 3
  # Applies to everyone when enabled:
  vexes-die-with-their-masters:
    enabled: true

config-version: ${project.version}
